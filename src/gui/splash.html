<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #122033;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            border: 1px solid #1e3a5f;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        .logo span { color: #0078d4; }
        .loader {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .loader-bar {
            width: 50%;
            height: 100%;
            background: #0078d4;
            position: absolute;
            animation: loading 1.5s infinite ease-in-out;
            border-radius: 10px;
        }
        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }
        .status {
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="logo">HDA<span>Automation</span></div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>
    <div class="status">Iniciando aplicación...</div>
</body>
</html>
